<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gestion Stock Excel</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js"></script>

<style>

body{
    font-family:Arial;
    margin:20px;
    background:#f5f5f5;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,.15);
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

h2{
    margin-top:0;
}

.total{
    font-size:20px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<h2>Gestion Stock Excel</h2>

<input
type="file"
id="fileInput"
accept=".xlsx,.xls">

</div>

<div class="card">

<h3>Recherche Produit</h3>

<input
id="search"
placeholder="Nom ou Code Barre">

<p>
Scanner directement avec votre lecteur code-barres USB
</p>

</div>

<div id="productArea"></div>

<div class="card">

<h3>Valeur du Stock</h3>

<div class="total">
Total Achat :
<span id="totalAchat">0</span> DA
</div>

<br>

<div class="total">
Total Vente :
<span id="totalVente">0</span> DA
</div>

<br>

<div class="total">
Bénéfice Potentiel :
<span id="benefice">0</span> DA
</div>

</div>

<div class="card">

<button onclick="telechargerExcel()">
Télécharger Excel Modifié
</button>

</div>

<script>

let workbook;
let sheetName;
let data = [];

////////////////////////////////////////////////////
//// CHARGEMENT EXCEL
////////////////////////////////////////////////////

document
.getElementById("fileInput")
.addEventListener("change", chargerExcel);

function chargerExcel(e){

const file = e.target.files[0];

const reader = new FileReader();

reader.onload = function(event){

workbook = XLSX.read(
event.target.result,
{type:'binary'}
);

sheetName = workbook.SheetNames[0];

data = XLSX.utils.sheet_to_json(
workbook.Sheets[sheetName]
);

calculerTotaux();

alert("Fichier chargé avec succès");

};

reader.readAsBinaryString(file);

}

////////////////////////////////////////////////////
//// RECHERCHE
////////////////////////////////////////////////////

document
.getElementById("search")
.addEventListener("keyup", function(e){

if(e.key==="Enter"){
chercherProduit();
}

});

function chercherProduit(){

const valeur =
document
.getElementById("search")
.value
.toLowerCase()
.trim();

const produit = data.find(p =>

String(p["Nom"]||"")
.toLowerCase()
.includes(valeur)

||

String(p["Code-barres"]||"")
.toLowerCase()
=== valeur

);

afficherProduit(produit);

}

////////////////////////////////////////////////////
//// AFFICHAGE
////////////////////////////////////////////////////

function afficherProduit(produit){

const zone =
document.getElementById("productArea");

if(!produit){

zone.innerHTML=
"<div class='card'><b>Produit introuvable</b></div>";

return;

}

zone.innerHTML=`

<div class="card">

<h3>Produit</h3>

Nom

<input
id="nom"
value="${produit["Nom"] || ""}">

Code Barre

<input
id="barcode"
value="${produit["Code-barres"] || ""}">

<svg id="barcodeSvg"></svg>

Quantité

<input
id="quantite"
type="number"
value="${produit["Quantité disponible"] || 0}">

Prix Achat

<input
id="cout"
type="number"
step="0.01"
value="${produit["Coût"] || 0}">

Prix Vente

<input
id="prix"
type="number"
step="0.01"
value="${produit["Prix de vente"] || 0}">

<button onclick="enregistrerProduit()">
Enregistrer Modification
</button>

</div>

`;

afficherBarcode();

}

////////////////////////////////////////////////////
//// CODE BARRE
////////////////////////////////////////////////////

function afficherBarcode(){

const code =
document.getElementById("barcode").value;

if(code){

JsBarcode(
"#barcodeSvg",
code,
{
format:"CODE128",
displayValue:true
}
);

}

}

////////////////////////////////////////////////////
//// SAUVEGARDE
////////////////////////////////////////////////////

function enregistrerProduit(){

const ancienCode =
document
.getElementById("search")
.value
.trim();

const produit = data.find(p =>

String(p["Code-barres"]) === ancienCode

||

String(p["Nom"])
.toLowerCase()
=== ancienCode.toLowerCase()

);

if(!produit){

alert("Produit introuvable");

return;

}

produit["Nom"] =
document.getElementById("nom").value;

produit["Code-barres"] =
document.getElementById("barcode").value;

produit["Quantité disponible"] =
Number(
document.getElementById("quantite").value
);

produit["Coût"] =
Number(
document.getElementById("cout").value
);

produit["Prix de vente"] =
Number(
document.getElementById("prix").value
);

calculerTotaux();

afficherBarcode();

alert("Modification enregistrée");

}

////////////////////////////////////////////////////
//// CALCULS
////////////////////////////////////////////////////

function calculerTotaux(){

let totalAchat = 0;
let totalVente = 0;

data.forEach(p=>{

const qte =
Number(
p["Quantité disponible"]
) || 0;

const achat =
Number(
p["Coût"]
) || 0;

const vente =
Number(
p["Prix de vente"]
) || 0;

totalAchat += qte * achat;
totalVente += qte * vente;

});

document.getElementById("totalAchat")
.innerText =
totalAchat.toFixed(2);

document.getElementById("totalVente")
.innerText =
totalVente.toFixed(2);

document.getElementById("benefice")
.innerText =
(totalVente-totalAchat)
.toFixed(2);

}

////////////////////////////////////////////////////
//// EXPORT EXCEL
////////////////////////////////////////////////////

function telechargerExcel(){

const ws =
XLSX.utils.json_to_sheet(data);

workbook.Sheets[sheetName] = ws;

XLSX.writeFile(
workbook,
"Stock_Modifie.xlsx"
);

}

</script>

</body>
</html>
