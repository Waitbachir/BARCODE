<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stock Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/18.5.1/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

</head>

<body>

<header>
  <h2>📦 Gestion Stock</h2>
</header>

<!-- DASHBOARD -->
<div class="dashboard">

  <div class="box">
    <h3 id="totalProducts">0</h3>
    <p>Produits</p>
  </div>

  <div class="box">
    <h3 id="totalQty">0</h3>
    <p>Quantité totale</p>
  </div>

  <div class="box">
    <h3 id="totalBuy">0 DA</h3>
    <p>Valeur Achat</p>
  </div>

  <div class="box">
    <h3 id="totalSell">0 DA</h3>
    <p>Valeur Vente</p>
  </div>

</div>

<!-- ACTIONS -->
<div class="actions">

  <input type="file" id="excel">

  <button onclick="startScan()">📷 Scanner</button>
  <button onclick="exportExcel()">📥 Télécharger Excel</button>

</div>

<!-- SEARCH -->
<div class="search">
  <input id="searchInput" placeholder="Nom ou code-barres">
  <button onclick="search()">🔎 Rechercher</button>
</div>

<!-- SCANNER -->
<div id="scanner" class="scanner hidden"></div>

<!-- RESULT -->
<div id="result"></div>

<!-- CREATE PRODUCT MODAL -->
<div id="createModal" class="modal hidden">
  <div class="box">

    <h3>Créer nouveau produit</h3>

    <input id="cName" placeholder="Nom produit">
    <input id="cBarcode" placeholder="Code-barres" readonly>
    <input id="cBuy" type="number" placeholder="Prix achat">
    <input id="cSell" type="number" placeholder="Prix vente">
    <input id="cQty" type="number" placeholder="Quantité">

    <button onclick="saveNew()">💾 Créer</button>
    <button onclick="closeCreate()">❌ Annuler</button>

  </div>
</div>

  
<!-- EDIT -->
<div id="editModal" class="modal hidden">
  <div class="box">

    <h3>Modifier produit</h3>

    <input id="eName">
    <input id="eBarcode" disabled>
    <input id="eBuy" type="number">
    <input id="eSell" type="number">
    <input id="eQty" type="number">

    <button onclick="saveEdit()">💾 Sauvegarder</button>
    <button onclick="closeEdit()">❌ Fermer</button>

  </div>
</div>

<script src="app.js"></script>

</body>
</html>
