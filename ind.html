<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stock Pro</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/18.5.1/xlsx.full.min.js"></script>

<!-- Scanner moderne (meilleur que Quagga) -->
<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

</head>

<body>

<header>
  <h2>Gestion Stock</h2>
</header>

<div class="top">

  <input type="file" id="excel">

  <button onclick="startScan()">📷 Scanner</button>

  <input id="searchInput" placeholder="Nom ou code-barres">
  <button onclick="search()">🔎 Rechercher</button>

</div>

<div id="scanner" class="scanner hidden"></div>

<div id="result"></div>

<!-- EDIT MODAL -->
<div id="editModal" class="modal hidden">
  <div class="box">

    <h3>Modifier produit</h3>

    <input id="eName">
    <input id="eBarcode" disabled>
    <input id="eBuy" type="number">
    <input id="eSell" type="number">
    <input id="eQty" type="number">

    <button onclick="saveEdit()">💾 Sauvegarder</button>
    <button onclick="closeEdit()">❌ Fermer</button>

  </div>
</div>

<script src="app.js"></script>

</body>
</html>
