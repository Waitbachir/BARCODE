<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock Scanner</title>

  <link rel="stylesheet" href="style.css">

  <!-- QuaggaJS (scanner barcode) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

  <!-- SheetJS (Excel import/export) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<header>
  <h1>Gestion Stock Mobile</h1>
</header>

<section class="controls">

  <input type="file" id="excelFile" accept=".xlsx,.xls"/>

  <button onclick="startScanner()">📷 Scanner</button>
  <button onclick="exportExcel()">📤 Export Excel</button>

</section>

<section id="scanner" class="scanner hidden"></section>

<section class="search">
  <input type="text" id="searchInput" placeholder="Rechercher produit...">
</section>

<section id="productList"></section>

<!-- Formulaire produit -->
<div id="productForm" class="modal hidden">
  <div class="modal-content">
    <h3>Produit introuvable</h3>

    <input id="pName" placeholder="Nom produit">
    <input id="pBarcode" placeholder="Code-barres" readonly>
    <input id="pBuy" type="number" placeholder="Prix achat">
    <input id="pSell" type="number" placeholder="Prix vente">
    <input id="pQty" type="number" placeholder="Quantité">

    <button onclick="saveNewProduct()">💾 Enregistrer</button>
    <button onclick="closeForm()">❌ Annuler</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
