from pathlib import Path

html = r"""<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion Stock Excel</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body{font-family:Arial;padding:20px}
input,button{padding:8px;margin:5px}
table{border-collapse:collapse;width:100%;margin-top:10px}
td,th{border:1px solid #ccc;padding:6px}
.card{border:1px solid #ddd;padding:10px;margin:10px 0}
</style>
</head>
<body>
<h2>Gestion des Produits Excel</h2>

<input type="file" id="fileInput" accept=".xlsx,.xls">

<div class="card">
<h3>Recherche produit</h3>
<input id="search" placeholder="Nom ou code barre">
<button onclick="chercher()">Rechercher</button>
</div>

<div id="resultat"></div>

<div class="card">
<h3>Totaux du stock</h3>
<p>Total achat: <span id="totalAchat">0</span></p>
<p>Total vente: <span id="totalVente">0</span></p>
</div>

<button onclick="telecharger()">Télécharger Excel modifié</button>

<script>
let workbook,data,sheetName;

document.getElementById('fileInput').addEventListener('change',e=>{
 const file=e.target.files[0];
 const reader=new FileReader();
 reader.onload=(ev)=>{
   workbook=XLSX.read(ev.target.result,{type:'binary'});
   sheetName=workbook.SheetNames[0];
   data=XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
   calculerTotaux();
   alert("Fichier chargé");
 };
 reader.readAsBinaryString(file);
});

function chercher(){
 const q=document.getElementById('search').value.toLowerCase().trim();
 const p=data.find(r=>
   String(r["Nom"]||"").toLowerCase().includes(q) ||
   String(r["Code-barres"]||"").toLowerCase()===q
 );

 const div=document.getElementById('resultat');

 if(!p){div.innerHTML="<b>Produit introuvable</b>";return;}

 div.innerHTML=`
 <div class="card">
 <h3>${p["Nom"]}</h3>
 <p>Code Barre : ${p["Code-barres"]}</p>

 Quantité :
 <input id="qte" type="number" value="${p["Quantité disponible"]||0}"><br>

 Prix Achat :
 <input id="cout" type="number" step="0.01" value="${p["Coût"]||0}"><br>

 Prix Vente :
 <input id="vente" type="number" step="0.01" value="${p["Prix de vente"]||0}"><br>

 <button onclick="sauver('${String(p["Code-barres"]).replace(/'/g,'')}')">Enregistrer</button>
 </div>`;
}

function sauver(code){
 const p=data.find(r=>String(r["Code-barres"])===String(code));
 p["Quantité disponible"]=Number(document.getElementById('qte').value);
 p["Coût"]=Number(document.getElementById('cout').value);
 p["Prix de vente"]=Number(document.getElementById('vente').value);
 calculerTotaux();
 alert("Modification enregistrée en mémoire");
}

function calculerTotaux(){
 let achat=0, vente=0;
 data.forEach(r=>{
   achat += (Number(r["Coût"])||0)*(Number(r["Quantité disponible"])||0);
   vente += (Number(r["Prix de vente"])||0)*(Number(r["Quantité disponible"])||0);
 });
 document.getElementById('totalAchat').innerText=achat.toFixed(2);
 document.getElementById('totalVente').innerText=vente.toFixed(2);
}

function telecharger(){
 const ws=XLSX.utils.json_to_sheet(data);
 workbook.Sheets[sheetName]=ws;
 XLSX.writeFile(workbook,'Stock_Modifie.xlsx');
}
</script>
</body>
</html>"""
p=Path("/mnt/data/Gestion_Stock_Excel.html")
p.write_text(html, encoding="utf-8")
print(str(p))
