<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock Scanner</title>

  <link rel="stylesheet" href="style.css">

  <!-- Quagga (scanner) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

  <!-- Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<header>
  <h2>Gestion Stock</h2>
</header>

<!-- IMPORT + SCAN -->
<div class="controls">
  <input type="file" id="excelFile">

  <button onclick="startScanner()">📷 Scanner</button>
  <button onclick="exportExcel()">📤 Export</button>
</div>

<!-- RECHERCHE -->
<div class="searchBox">
  <input type="text" id="searchInput" placeholder="Code-barres ou Nom produit">
  <button onclick="searchProduct()">🔎 Rechercher</button>
</div>

<!-- SCANNER -->
<div id="scanner" class="scanner hidden"></div>

<!-- LISTE -->
<div id="productList"></div>

<!-- FORM AJOUT PRODUIT -->
<div id="productForm" class="modal hidden">
  <div class="modalBox">
    <h3>Produit introuvable</h3>

    <input id="pName" placeholder="Nom produit">
    <input id="pBarcode" placeholder="Code-barres" readonly>
    <input id="pBuy" type="number" placeholder="Prix achat">
    <input id="pSell" type="number" placeholder="Prix vente">
    <input id="pQty" type="number" placeholder="Quantité">

    <button onclick="saveNewProduct()">💾 Enregistrer</button>
    <button onclick="closeForm()">❌ Annuler</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
